suite: RBAC
release:
  name: test
  namespace: ouroboros
tests:
  - it: ClusterRole grants read-only access to Ingress by default
    template: clusterrole.yaml
    asserts:
      - isKind:
          of: ClusterRole
      - contains:
          path: rules
          content:
            apiGroups: ["networking.k8s.io"]
            resources: ["ingresses"]
            verbs: ["get", "list", "watch"]

  - it: ClusterRole adds Gateway and HTTPRoute when gatewayApi.enabled
    template: clusterrole.yaml
    set:
      controller.gatewayApi.enabled: true
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["gateway.networking.k8s.io"]
            resources: ["gateways", "httproutes"]
            verbs: ["get", "list", "watch"]

  - it: ClusterRole excludes Gateway-API rules by default
    template: clusterrole.yaml
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups: ["gateway.networking.k8s.io"]
            resources: ["gateways", "httproutes"]
            verbs: ["get", "list", "watch"]

  - it: ClusterRole does not grant services access in etcHosts mode (controller does not look services up)
    template: clusterrole.yaml
    set:
      etcHosts.enabled: true
      etcHosts.proxyIP: 10.96.1.2
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["services"]
            verbs: ["get", "list", "watch"]

  - it: Role in kube-system targets only the coredns ConfigMap
    template: role-coredns.yaml
    documentIndex: 0
    asserts:
      - isKind:
          of: Role
      - equal:
          path: metadata.namespace
          value: kube-system
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["configmaps"]
            resourceNames: ["coredns"]
            verbs: ["get", "update", "patch"]

  - it: RoleBinding subject points at the controller ServiceAccount
    template: role-coredns.yaml
    documentIndex: 1
    asserts:
      - isKind:
          of: RoleBinding
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - equal:
          path: subjects[0].name
          value: test-ouroboros
      - equal:
          path: subjects[0].namespace
          value: ouroboros

  - it: Role and RoleBinding are suppressed in etc-hosts mode
    template: role-coredns.yaml
    set:
      etcHosts.enabled: true
      etcHosts.proxyIP: 10.96.1.2
    asserts:
      - hasDocuments:
          count: 0

  - it: kube-system Role is suppressed in external-dns mode
    template: role-coredns.yaml
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
    asserts:
      - hasDocuments:
          count: 0

  - it: inline kube-system coredns Role is suppressed in coredns-import mode
    template: role-coredns.yaml
    set:
      controller.mode: coredns-import
    asserts:
      - hasDocuments:
          count: 0

  - it: coredns-import Role targets the configured separate ConfigMap
    template: role-coredns-import.yaml
    set:
      controller.mode: coredns-import
    documentIndex: 0
    asserts:
      - isKind:
          of: Role
      - equal:
          path: metadata.namespace
          value: kube-system
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["configmaps"]
            resourceNames: ["coredns-custom"]
            verbs: ["get", "update", "patch"]

  - it: coredns-import RoleBinding subject points at the controller ServiceAccount
    template: role-coredns-import.yaml
    set:
      controller.mode: coredns-import
    documentIndex: 1
    asserts:
      - isKind:
          of: RoleBinding
      - equal:
          path: subjects[0].name
          value: test-ouroboros
      - equal:
          path: subjects[0].namespace
          value: ouroboros

  - it: coredns-import Role honours custom configmap and namespace overrides
    template: role-coredns-import.yaml
    set:
      controller.mode: coredns-import
      controller.corednsImport.namespace: my-coredns-ns
      controller.corednsImport.configmap: my-coredns-custom
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.namespace
          value: my-coredns-ns
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["configmaps"]
            resourceNames: ["my-coredns-custom"]
            verbs: ["get", "update", "patch"]

  - it: coredns-import Role is suppressed in coredns mode (default)
    template: role-coredns-import.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: coredns-import Role is suppressed in etc-hosts mode
    template: role-coredns-import.yaml
    set:
      etcHosts.enabled: true
      etcHosts.proxyIP: 10.96.1.2
    asserts:
      - hasDocuments:
          count: 0

  - it: coredns-import Role is suppressed in external-dns mode
    template: role-coredns-import.yaml
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
    asserts:
      - hasDocuments:
          count: 0

  - it: external-dns Role grants the dnsendpoints verb set
    template: role-externaldns.yaml
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
    documentIndex: 0
    asserts:
      - isKind:
          of: Role
      - equal:
          path: metadata.namespace
          value: ouroboros
      - contains:
          path: rules
          content:
            apiGroups: ["externaldns.k8s.io"]
            resources: ["dnsendpoints"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - it: external-dns Role does NOT include Service get when proxyIP is supplied
    template: role-externaldns.yaml
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
    documentIndex: 0
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["services"]
            resourceNames: ["test-ouroboros-proxy"]
            verbs: ["get"]

  - it: external-dns mode renders a separate discover Role in the release namespace for Service get
    template: role-externaldns.yaml
    set:
      controller.mode: external-dns
    documentIndex: 2
    asserts:
      - isKind:
          of: Role
      - equal:
          path: metadata.namespace
          value: ouroboros
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["services"]
            resourceNames: ["test-ouroboros-proxy"]
            verbs: ["get"]

  - it: external-dns RoleBinding subject points at the controller ServiceAccount
    template: role-externaldns.yaml
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
    documentIndex: 1
    asserts:
      - isKind:
          of: RoleBinding
      - equal:
          path: subjects[0].name
          value: test-ouroboros
      - equal:
          path: subjects[0].namespace
          value: ouroboros

  - it: external-dns Role is suppressed in coredns mode
    template: role-externaldns.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: external-dns Role is suppressed in etc-hosts mode
    template: role-externaldns.yaml
    set:
      etcHosts.enabled: true
      etcHosts.proxyIP: 10.96.1.2
    asserts:
      - hasDocuments:
          count: 0

  - it: ClusterRoleBinding subject points at the controller ServiceAccount
    template: clusterrolebinding.yaml
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: subjects[0].name
          value: test-ouroboros
      - equal:
          path: subjects[0].namespace
          value: ouroboros
