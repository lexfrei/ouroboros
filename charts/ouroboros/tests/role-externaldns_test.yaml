suite: role-externaldns rendering
release:
  name: test
  namespace: ouroboros
templates:
  - role-externaldns.yaml
tests:
  - it: renders only when controller.mode is external-dns
    asserts:
      - hasDocuments:
          count: 0

  - it: renders 4 documents in external-dns mode with auto-discovery (records Role+RB + discover Role+RB)
    set:
      controller.mode: external-dns
    asserts:
      - hasDocuments:
          count: 4

  - it: renders 2 documents when proxyIP is supplied (no discover Role needed)
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
    asserts:
      - hasDocuments:
          count: 2

  - it: respects externalDns.namespace override on the records Role
    set:
      controller.mode: external-dns
      externalDns.namespace: dns-records
    documentIndex: 0
    asserts:
      - isKind:
          of: Role
      - equal:
          path: metadata.namespace
          value: dns-records

  - it: discover Role stays in the release namespace even when records ns differs
    set:
      controller.mode: external-dns
      externalDns.namespace: dns-records
    documentIndex: 2
    asserts:
      - isKind:
          of: Role
      - equal:
          path: metadata.namespace
          value: ouroboros
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["services"]
            resourceNames: ["test-ouroboros-proxy"]
            verbs: ["get"]

  - it: defaults records Role namespace to release namespace when externalDns.namespace is empty
    set:
      controller.mode: external-dns
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.namespace
          value: ouroboros

  - it: respects externalDns.proxyService override in resourceNames
    set:
      controller.mode: external-dns
      externalDns.proxyService: my-custom-proxy
    documentIndex: 2
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["services"]
            resourceNames: ["my-custom-proxy"]
            verbs: ["get"]

  - it: records RoleBinding refers to the matching Role
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
    documentIndex: 1
    asserts:
      - equal:
          path: roleRef.name
          value: test-ouroboros-externaldns
      - equal:
          path: roleRef.kind
          value: Role

  - it: dnsendpoints rule still grants the verb set
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
    documentIndex: 0
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["externaldns.k8s.io"]
            resources: ["dnsendpoints"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - it: output=service swaps the records Role to grant services CRUD
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
      externalDns.output: service
      externalDns.annotationPrefix: internal-dns/
    documentIndex: 0
    asserts:
      - isKind:
          of: Role
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["services"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      - notContains:
          path: rules
          content:
            apiGroups: ["externaldns.k8s.io"]
            resources: ["dnsendpoints"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
