suite: ServiceAccount
templates:
  - serviceaccount.yaml
  - _helpers.tpl
release:
  name: test
  namespace: ouroboros
tests:
  - it: renders a ServiceAccount with the controller fullname by default
    template: serviceaccount.yaml
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: test-ouroboros

  - it: honours serviceAccount.name override
    template: serviceaccount.yaml
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: honours serviceAccount.annotations
    template: serviceaccount.yaml
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123:role/sa
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123:role/sa
