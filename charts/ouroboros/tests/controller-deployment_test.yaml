suite: controller deployment
templates:
  - controller-deployment.yaml
  - _helpers.tpl
release:
  name: test
  namespace: ouroboros
tests:
  - it: renders a Deployment by default
    template: controller-deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-ouroboros
      - equal:
          path: spec.replicas
          value: 1

  - it: passes mode=coredns to the binary
    template: controller-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --mode=coredns
      - contains:
          path: spec.template.spec.containers[0].args
          content: controller

  - it: passes mode=coredns-import args when corednsImport mode is selected
    template: controller-deployment.yaml
    set:
      controller.mode: coredns-import
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --mode=coredns-import
      - contains:
          path: spec.template.spec.containers[0].args
          content: --coredns-import-namespace=kube-system
      - contains:
          path: spec.template.spec.containers[0].args
          content: --coredns-import-configmap=coredns-custom
      - contains:
          path: spec.template.spec.containers[0].args
          content: --coredns-import-key=ouroboros.override
      - contains:
          path: spec.template.spec.containers[0].args
          content: --proxy-fqdn=test-ouroboros-proxy.ouroboros.svc.cluster.local.

  - it: omits inline --coredns-* flags in coredns-import mode
    template: controller-deployment.yaml
    set:
      controller.mode: coredns-import
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --coredns-namespace=kube-system
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --coredns-configmap=coredns
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --coredns-key=Corefile

  - it: passes the proxy FQDN derived from release namespace
    template: controller-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --proxy-fqdn=test-ouroboros-proxy.ouroboros.svc.cluster.local.

  - it: omits --gateway-api flag when controller.gatewayApi.enabled is false
    template: controller-deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --gateway-api

  - it: adds --gateway-api flag when enabled
    template: controller-deployment.yaml
    set:
      controller.gatewayApi.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --gateway-api

  - it: honours replicaCount override
    template: controller-deployment.yaml
    set:
      controller.replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: applies pod-level securityContext defaults (runAsNonRoot)
    template: controller-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 65534

  - it: applies container-level securityContext defaults
    template: controller-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: is suppressed entirely when etcHosts mode is enabled
    template: controller-deployment.yaml
    set:
      etcHosts.enabled: true
      etcHosts.proxyIP: 10.96.1.2
    asserts:
      - hasDocuments:
          count: 0

  - it: is suppressed when controller.enabled is false
    template: controller-deployment.yaml
    set:
      controller.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: external-dns mode passes mode=external-dns and dns-specific args
    template: controller-deployment.yaml
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
      externalDns.recordTTL: 300
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --mode=external-dns
      - contains:
          path: spec.template.spec.containers[0].args
          content: --external-dns-namespace=ouroboros
      - contains:
          path: spec.template.spec.containers[0].args
          content: --external-dns-record-ttl=300
      - contains:
          path: spec.template.spec.containers[0].args
          content: --external-dns-proxy-ip=10.42.0.7

  - it: external-dns mode does NOT emit coredns args
    template: controller-deployment.yaml
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --coredns-namespace=kube-system
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --proxy-fqdn=test-ouroboros-proxy.ouroboros.svc.cluster.local.

  - it: external-dns mode renders one --external-dns-annotation flag per map entry
    template: controller-deployment.yaml
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
      externalDns.annotations:
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
        external-dns.alpha.kubernetes.io/aws-region: us-east-1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --external-dns-annotation=external-dns.alpha.kubernetes.io/cloudflare-proxied=false
      - contains:
          path: spec.template.spec.containers[0].args
          content: --external-dns-annotation=external-dns.alpha.kubernetes.io/aws-region=us-east-1

  - it: external-dns mode passes output=crd by default
    template: controller-deployment.yaml
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --external-dns-output=crd

  - it: external-dns service output renders the prefix flag too
    template: controller-deployment.yaml
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
      externalDns.output: service
      externalDns.annotationPrefix: internal-dns/
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --external-dns-output=service
      - contains:
          path: spec.template.spec.containers[0].args
          content: --external-dns-annotation-prefix=internal-dns/

  - it: annotationPrefix falls back to upstream default when unset
    # helm upgrade --reuse-values from a pre-PR release won't carry the
    # new annotationPrefix key — an empty render would crash the
    # controller in output=service mode (validation requires non-empty
    # + '/' suffix). The template-level `default` guards this path.
    template: controller-deployment.yaml
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
      externalDns.annotationPrefix: null
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --external-dns-annotation-prefix=external-dns.alpha.kubernetes.io/

  - it: external-dns mode renders one --external-dns-label flag per map entry
    template: controller-deployment.yaml
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
      externalDns.labels:
        external-dns-instance: internal-dns
        team: platform
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --external-dns-label=external-dns-instance=internal-dns
      - contains:
          path: spec.template.spec.containers[0].args
          content: --external-dns-label=team=platform

  - it: service output renders annotation and label flags too
    # Documents the chart contract — annotation/label flags apply to
    # whichever kind ouroboros emits (DNSEndpoint OR Service). external-dns
    # --label-filter scopes per-instance against either kind, so this
    # path must render the flags identically to crd output.
    template: controller-deployment.yaml
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
      externalDns.output: service
      externalDns.annotationPrefix: internal-dns/
      externalDns.annotations:
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
      externalDns.labels:
        external-dns-instance: internal-dns
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --external-dns-output=service
      - contains:
          path: spec.template.spec.containers[0].args
          content: --external-dns-annotation=external-dns.alpha.kubernetes.io/cloudflare-proxied=false
      - contains:
          path: spec.template.spec.containers[0].args
          content: --external-dns-label=external-dns-instance=internal-dns

  - it: external-dns mode also accepts --ingress-class and --gateway-class
    template: controller-deployment.yaml
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
      controller.ingressClass: nginx-proxy
      controller.gatewayClass: envoy-proxy
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --ingress-class=nginx-proxy
      - contains:
          path: spec.template.spec.containers[0].args
          content: --gateway-class=envoy-proxy

  - it: OUROBOROS_INSTANCE env var is set from the release name
    template: controller-deployment.yaml
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OUROBOROS_INSTANCE
            value: test

  - it: external-dns mode rejects replicaCount > 1 because there is no leader-election
    template: controller-deployment.yaml
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
      controller.replicaCount: 2
    asserts:
      - failedTemplate:
          errorMessage: "controller.replicaCount=2 is unsafe in external-dns mode: ouroboros has no leader-election, two reconcilers would race on Get->Update against the same DNSEndpoints. Set controller.replicaCount=1 or pick a different mode."

  - it: coredns mode allows replicaCount > 1 (unaffected by external-dns concern)
    template: controller-deployment.yaml
    set:
      controller.replicaCount: 2
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: external-dns mode pins Deployment strategy to Recreate to dodge upgrade race
    template: controller-deployment.yaml
    set:
      controller.mode: external-dns
      externalDns.proxyIP: 10.42.0.7
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: coredns mode does NOT force Recreate (default RollingUpdate is fine without ownership races)
    template: controller-deployment.yaml
    asserts:
      - notExists:
          path: spec.strategy
