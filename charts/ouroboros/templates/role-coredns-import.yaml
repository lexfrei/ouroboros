{{- if eq (include "ouroboros.mode" .) "coredns-import" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ouroboros.fullname" . }}-coredns-import
  namespace: {{ .Values.controller.corednsImport.namespace }}
  labels:
    {{- include "ouroboros.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["{{ .Values.controller.corednsImport.configmap }}"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ouroboros.fullname" . }}-coredns-import
  namespace: {{ .Values.controller.corednsImport.namespace }}
  labels:
    {{- include "ouroboros.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ouroboros.fullname" . }}-coredns-import
subjects:
  - kind: ServiceAccount
    name: {{ include "ouroboros.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
