{{- if eq (include "ouroboros.mode" .) "external-dns" }}
{{- $proxyService := default (include "ouroboros.proxyFullname" .) .Values.externalDns.proxyService }}
{{- $namespace := include "ouroboros.externalDnsNamespace" . }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ouroboros.fullname" . }}-externaldns
  namespace: {{ $namespace }}
  labels:
    {{- include "ouroboros.labels" . | nindent 4 }}
rules:
  - apiGroups: ["externaldns.k8s.io"]
    resources: ["dnsendpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- if not .Values.externalDns.proxyIP }}
  # Auto-discovery wants the proxy Service ClusterIP. resourceNames
  # restricts the GET to exactly the proxy Service so this Role does
  # not become a generic "list all Services in this namespace" hole.
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["{{ $proxyService }}"]
    verbs: ["get"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ouroboros.fullname" . }}-externaldns
  namespace: {{ $namespace }}
  labels:
    {{- include "ouroboros.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ouroboros.fullname" . }}-externaldns
subjects:
  - kind: ServiceAccount
    name: {{ include "ouroboros.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
