{{- if and .Values.proxy.enabled .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ouroboros.proxyFullname" . }}
  labels:
    {{- include "ouroboros.proxyLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ouroboros.proxySelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- if .Values.networkPolicy.ingress.from }}
        {{- toYaml .Values.networkPolicy.ingress.from | nindent 8 }}
        {{- else }}
        # Default: every pod in every namespace. The hairpin use case is
        # cluster-wide internal traffic, so a same-namespace-only policy
        # (a bare podSelector: {}) would defeat the purpose.
        - namespaceSelector: {}
        {{- end }}
      ports:
        - port: 8080
          protocol: TCP
        - port: 8443
          protocol: TCP
{{- end }}
