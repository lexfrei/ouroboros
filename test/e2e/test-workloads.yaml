---
apiVersion: v1
kind: Namespace
metadata:
  name: hairpin-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  namespace: hairpin-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
    spec:
      containers:
        - name: echo
          image: traefik/whoami:v1.10
          args:
            - "--port=8080"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: echo
  namespace: hairpin-test
spec:
  selector:
    app: echo
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
# Ingress path: hairpin-ingress.example.invalid -> echo
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: echo-ingress
  namespace: hairpin-test
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - hairpin-ingress.example.invalid
      secretName: ingress-tls
  rules:
    - host: hairpin-ingress.example.invalid
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo
                port:
                  number: 80
---
# Gateway-API path: hairpin-gateway.example.invalid -> echo, via Gateway+HTTPRoute
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: echo-gateway
  namespace: hairpin-test
spec:
  gatewayClassName: traefik
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: hairpin-gateway.example.invalid
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: gateway-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-route
  namespace: hairpin-test
spec:
  parentRefs:
    - name: echo-gateway
  hostnames:
    - hairpin-gateway.example.invalid
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: echo
          port: 80
