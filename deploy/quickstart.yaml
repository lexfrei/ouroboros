# Source: ouroboros/templates/controller-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ouroboros
  labels:
    helm.sh/chart: ouroboros-0.1.0
    app.kubernetes.io/name: ouroboros
    app.kubernetes.io/instance: ouroboros
    app.kubernetes.io/component: controller
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ouroboros
      app.kubernetes.io/instance: ouroboros
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ouroboros
        app.kubernetes.io/instance: ouroboros
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: ouroboros
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: "ghcr.io/lexfrei/ouroboros:0.1.0"
          imagePullPolicy: IfNotPresent
          args:
            - controller
            - --mode=coredns
            - --coredns-namespace=kube-system
            - --coredns-configmap=coredns
            - --coredns-key=Corefile
            - --proxy-fqdn=ouroboros-proxy.ouroboros.svc.cluster.local.
            - --resync=10m
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
---
# Source: ouroboros/templates/proxy-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ouroboros-proxy
  labels:
    helm.sh/chart: ouroboros-0.1.0
    app.kubernetes.io/name: ouroboros
    app.kubernetes.io/instance: ouroboros
    app.kubernetes.io/component: proxy
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ouroboros
      app.kubernetes.io/instance: ouroboros
      app.kubernetes.io/component: proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ouroboros
        app.kubernetes.io/instance: ouroboros
        app.kubernetes.io/component: proxy
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: proxy
          image: "ghcr.io/lexfrei/ouroboros:0.1.0"
          imagePullPolicy: IfNotPresent
          args:
            - proxy
            - --listen-http=:8080
            - --listen-https=:8443
            - --listen-health=:8081
            - --target-host=ingress-nginx-controller.ingress-nginx.svc.cluster.local
            - --target-http-port=80
            - --target-https-port=443
            - --dial-timeout=5s
            - --ready-timeout=2s
            - --shutdown-grace=30s
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: https
              containerPort: 8443
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 32Mi
