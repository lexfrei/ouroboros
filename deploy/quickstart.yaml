      app.kubernetes.io/name: ouroboros
      app.kubernetes.io/instance: ouroboros
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ouroboros
        app.kubernetes.io/instance: ouroboros
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: ouroboros
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: "ghcr.io/lexfrei/ouroboros:0.1.0"
          imagePullPolicy: IfNotPresent
          args:
            - controller
            - --mode=coredns
            - --resync=30s
            - --log-level=info
            - --coredns-namespace=kube-system
            - --coredns-configmap=coredns
            - --coredns-key=Corefile
            - --proxy-service-name=ouroboros-proxy
            - --proxy-service-namespace=ouroboros
          env:
            - name: OUROBOROS_INSTANCE
              value: "ouroboros"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
